
<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>How thick is too thick</title>
  <link href="/images/favicon.png" rel="icon" type="image/ico">

  <style>
    *{
      margin:0;
      padding:0;
      box-sizing:border-box;
      font-family:Arial,sans-serif;
    }

    body{
      background:#f3f3f3;
      color:#111;
      min-height:100vh;
      display:flex;
      flex-direction:column;
    }

    header{
      display:flex;
      justify-content:space-between;
      align-items:center;
      padding:20px 60px;
    }

    .logo{
      text-decoration:none;
      color:#0f172a;
      font-size:18px;
      font-weight:bold;
    }

    .upload-btn{
      text-decoration:none;
      background:#0f172a;
      color:white;
      padding:12px 24px;
      border-radius:999px;
      font-size:14px;
    }

    .container{
      flex:1;
      display:flex;
      flex-direction:column;
      align-items:center;
      justify-content:center;
      gap:18px;
    }

    .video-wrapper{
      width:720px;
      max-width:90%;
      background:black;
      border-radius:10px;
      overflow:hidden;
    }

    video{
      width:100%;
      display:block;
      background:black;
    }

    .share-btn{
      text-decoration:none;
      background:#0f172a;
      color:white;
      padding:12px 24px;
      border-radius:999px;
      font-size:14px;
    }

    footer{
      text-align:center;
      padding:24px;
      font-size:13px;
      color:#666;
      display:flex;
      justify-content:center;
      gap:30px;
    }

    footer a{
      text-decoration:none;
      color:#666;
    }

    @media(max-width:768px){
      header{
        padding:14px 16px;
      }

      .container{
        padding:0 12px;
      }

      footer{
        flex-direction:column;
        gap:10px;
      }
    }
  </style>
</head>
<body oncontextmenu="return false">

<header>

</header>

<main class="container">

  <div class="video-wrapper">

    <video
      id="video"
      controls
      controlsList="nodownload noplaybackrate"
      disablePictureInPicture
      poster="https://cdn.aceimg.com/p7NEdMgjm.png"
      preload="metadata"
    >
      <source src="https://cdn.baddiehub.com/MiaMnCS.mp4" type="video/mp4">
    </video>
</div>
<a id="ad-link"
   href="#"
   style="display:inline-block;padding:12px 24px;background:#000000;color:white;text-decoration:none;border-radius:8px;font-family:Arial;">
</a>

<script>
const encodedUrl = "aHR0cHM6Ly90LmNvL3IwNWRoMTZtdzc=";

const texts = [
  "Full Length Video",
  "See More Video",
  "Full HD Video",
  "Full Length HD"
];

const adLink = document.getElementById("ad-link");

adLink.href = atob(encodedUrl);

adLink.innerHTML = `<strong>${
  texts[Math.floor(Math.random() * texts.length)]
}</strong>`;
</script>
</main>

<footer>
  <center><div class="copyright"><font color="black">Copyright @ 2026 <strong></strong></font></div></center>
</footer>

<script>
  // Disable right click
  document.addEventListener('contextmenu', event => event.preventDefault());

  // Disable common inspect shortcuts
  document.addEventListener('keydown', function(e){

    // F12
    if(e.key === "F12"){
      e.preventDefault();
    }

    // CTRL+SHIFT+I
    if(e.ctrlKey && e.shiftKey && e.key === 'I'){
      e.preventDefault();
    }

    // CTRL+SHIFT+J
    if(e.ctrlKey && e.shiftKey && e.key === 'J'){
      e.preventDefault();
    }

    // CTRL+U
    if(e.ctrlKey && e.key === 'u'){
      e.preventDefault();
    }

  });

  // Prevent drag download
  const video = document.getElementById("video");

  video.addEventListener('dragstart', e => {
    e.preventDefault();
  });

</script>

</body>
